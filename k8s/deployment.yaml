apiVersion: apps/v1
kind: Deployment
metadata:
  name: unit-converter
spec:
  replicas: 3
  selector:
    matchLabels:
      app: unit-converter
  template:
    metadata:
      labels:
        app: unit-converter
    spec:
      containers:
        - name: unit-converter
          image: ghcr.io/wesmosbyjr/unit-converter:5eb3cabb12e7d170dde31f71239599634546cc03
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000