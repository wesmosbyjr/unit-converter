name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wesmosbyjr/unit-converter:${{ github.sha }}
            ghcr.io/wesmosbyjr/unit-converter:latest

  update-image-pin:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin deployment image to current commit SHA
        run: |
          sed -i "s#ghcr.io/wesmosbyjr/unit-converter:[^\"[:space:]]*#ghcr.io/wesmosbyjr/unit-converter:${{ github.sha }}#g" k8s/deployment.yaml

      - name: Create branch and PR for image pin update
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/pin-image-${{ github.sha }}
          base: main
          commit-message: "chore: pin deployment image to ${{ github.sha }} [skip ci]"
          title: "chore: pin deployment image to ${{ github.sha }}"
          body: |
            This PR updates the deployment manifest to pin the app image to the current commit SHA.

            Generated by CI after a successful main-branch build.
          delete-branch: true
          labels: |
            automated
            deployment